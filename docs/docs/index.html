<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VATPHIL Sector Updater</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.13);
      --red: #e8394d;
      --blue: #1e5ef3;
      --blue2: #5b8ef7;
      --green: #22c55e;
      --text: #eef0f8;
      --muted: #3d4a6e;
      --muted2: #6b7a9e;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { height: 100vh; overflow: hidden; font-family: 'Outfit', sans-serif; color: var(--text); }

    .bg-image {
      position: fixed; inset: 0; z-index: 0;
      background-image: url('docs/Image.png');
      background-size: cover;
      background-position: center;
      filter: saturate(0.45) brightness(0.5);
    }
    .bg-overlay {
      position: fixed; inset: 0; z-index: 1;
      background:
        radial-gradient(ellipse 90% 90% at 50% 50%, rgba(3,4,10,0.2) 0%, rgba(3,4,10,0.72) 100%),
        linear-gradient(to bottom, rgba(3,4,10,0.55) 0%, rgba(3,4,10,0.15) 45%, rgba(3,4,10,0.75) 100%);
    }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 48px; height: 64px;
      background: rgba(3,4,10,0.6);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo img { height: 34px; width: auto; display: block; }
    .nav-links { display: flex; align-items: center; gap: 4px; }
    .nav-link {
      font-size: 13px; font-weight: 500; color: var(--muted2);
      text-decoration: none; padding: 7px 16px; border-radius: 8px;
      border: 1px solid transparent; transition: all 0.15s; letter-spacing: 0.04em;
    }
    .nav-link:hover { color: var(--text); background: rgba(255,255,255,0.05); border-color: var(--border); }

    .hero {
      position: relative; z-index: 2;
      height: calc(100vh - 64px); margin-top: 64px;
      display: flex; align-items: center; justify-content: center;
      padding: 0 48px;
    }
    .hero-inner {
      max-width: 1100px; width: 100%;
      display: grid; grid-template-columns: 1fr 480px;
      gap: 80px; align-items: center;
    }

    .hero-eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: 'Space Mono', monospace;
      font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--muted2); border: 1px solid var(--border);
      padding: 6px 14px; border-radius: 20px; margin-bottom: 28px;
      background: rgba(255,255,255,0.03);
    }
    .eyebrow-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--red); box-shadow: 0 0 6px var(--red); flex-shrink: 0;
    }

    .hero-logo-img {
      display: block;
      height: clamp(70px, 9vw, 120px);
      width: auto;
      margin-bottom: 28px;
    }

    .hero-desc {
      font-size: 17px; line-height: 1.75; color: var(--muted2);
      max-width: 460px; margin-bottom: 44px;
    }
    .hero-desc code {
      font-family: 'Space Mono', monospace; font-size: 13px;
      color: var(--blue2); background: rgba(30,94,243,0.1);
      padding: 2px 7px; border-radius: 4px; border: 1px solid rgba(30,94,243,0.2);
    }

    .hero-actions { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }

    .btn-primary {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 14px 28px; background: var(--blue); color: white;
      font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 700;
      letter-spacing: 0.04em; border-radius: 12px; text-decoration: none;
      border: none; cursor: pointer;
      box-shadow: 0 0 0 1px rgba(30,94,243,0.4), 0 8px 32px rgba(30,94,243,0.35);
      transition: all 0.15s; position: relative; overflow: hidden;
    }
    .btn-primary::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 60%);
      pointer-events: none;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 0 1px rgba(30,94,243,0.6), 0 16px 48px rgba(30,94,243,0.5);
    }
    .btn-secondary {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 24px; background: rgba(255,255,255,0.05); color: var(--muted2);
      font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 500;
      letter-spacing: 0.02em; border-radius: 12px; text-decoration: none;
      border: 1px solid var(--border2); cursor: pointer; transition: all 0.15s;
    }
    .btn-secondary:hover { color: var(--text); background: rgba(255,255,255,0.09); border-color: rgba(255,255,255,0.22); }

    .version-strip { display: flex; align-items: center; gap: 10px; margin-top: 32px; flex-wrap: wrap; }
    .ver-badge { font-family: 'Space Mono', monospace; font-size: 11px; padding: 5px 12px; border-radius: 6px; letter-spacing: 0.08em; }
    .ver-badge.stable { background: rgba(34,197,94,0.1); color: var(--green); border: 1px solid rgba(34,197,94,0.25); }
    .ver-badge.label  { background: rgba(255,255,255,0.04); color: var(--muted2); border: 1px solid var(--border); }

    .hero-visual { position: relative; }
    .mockup-frame {
      border-radius: 16px; border: 1px solid var(--border2); overflow: hidden;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.04), 0 40px 80px rgba(0,0,0,0.8), 0 0 60px rgba(30,94,243,0.08);
      animation: floatUp 0.8s cubic-bezier(0.16,1,0.3,1) both 0.2s;
    }
    .mockup-frame img { display: block; width: 100%; height: auto; }
    .mockup-glow {
      position: absolute; bottom: -40px; left: 50%; transform: translateX(-50%);
      width: 80%; height: 60px;
      background: radial-gradient(ellipse, rgba(30,94,243,0.25) 0%, transparent 70%);
      filter: blur(20px); pointer-events: none;
    }

    @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    @keyframes floatUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
    .hero-left > * { animation: slideUp 0.7s cubic-bezier(0.16,1,0.3,1) both; }
    .hero-left > *:nth-child(1) { animation-delay: 0.00s; }
    .hero-left > *:nth-child(2) { animation-delay: 0.08s; }
    .hero-left > *:nth-child(3) { animation-delay: 0.14s; }
    .hero-left > *:nth-child(4) { animation-delay: 0.20s; }
    .hero-left > *:nth-child(5) { animation-delay: 0.26s; }

    @media (max-width: 900px) {
      .hero-inner { grid-template-columns: 1fr; }
      .hero-visual { display: none; }
      nav, .hero { padding-left: 24px; padding-right: 24px; }
    }
    @media (max-width: 600px) {
      .nav-links .nav-link { display: none; }
    }
  </style>
</head>
<body>

<div class="bg-image"></div>
<div class="bg-overlay"></div>

<nav>
  <a class="nav-logo" href="#">
    <img src="docs/small.png" alt="VATPHIL"
      onerror="this.src='https://raw.githubusercontent.com/HacobAllon/VATPHIL-Sector-Updater/refs/heads/main/docs/small.png'" />
  </a>
  <div class="nav-links">
    <a href="#" class="nav-link">Docs</a>
    <a href="https://github.com/HacobAllon/VATPHIL-Sector-Updater" class="nav-link" target="_blank" rel="noopener">GitHub</a>
  </div>
</nav>

<section class="hero">
  <div class="hero-inner">
    <div class="hero-left">
      <div class="hero-eyebrow">
        <div class="eyebrow-dot"></div>
        Philippines vACC · VATSIM
      </div>

      <img
        class="hero-logo-img"
        src="docs/large.png"
        alt="VATPHIL"
        onerror="this.src='https://raw.githubusercontent.com/HacobAllon/VATPHIL-Sector-Updater/refs/heads/main/docs/large.png'"
      />

      <p class="hero-desc">
        An open-source <code>sector file manager</code> for the VATPHIL vACC. Keeps your EuroScope setup perfectly in sync with the latest AIRAC data.
      </p>
      <div class="hero-actions">
        <a id="download-btn" href="https://github.com/HacobAllon/VATPHIL-Sector-Updater/releases" class="btn-primary" target="_blank" rel="noopener">
          ⬇ Download Latest
        </a>
        <a href="https://github.com/HacobAllon/VATPHIL-Sector-Updater" class="btn-secondary" target="_blank" rel="noopener">
          ◈ View on GitHub
        </a>
      </div>
      <div class="version-strip">
        <span class="ver-badge stable">v0.8.10</span>
        <span class="ver-badge label">Windows</span>
      </div>
    </div>

    <div class="hero-visual">
      <div class="mockup-frame">
        <img
          src="docs/updater.png"
          alt="VATPHIL Updater"
          onerror="this.onerror=null; this.src='https://raw.githubusercontent.com/HacobAllon/VATPHIL-Sector-Updater/refs/heads/main/docs/updater.png'"
        />
      </div>
      <div class="mockup-glow"></div>
    </div>
  </div>
</section>


<script>
  (async () => {
    // Fix background image if local path fails
    const bgEl = document.querySelector('.bg-image');
    const testImg = new Image();
    testImg.onerror = () => {
      bgEl.style.backgroundImage = "url('https://raw.githubusercontent.com/HacobAllon/VATPHIL-Sector-Updater/refs/heads/main/docs/Image.png')";
    };
    testImg.src = 'docs/Image.png';

    const btn = document.getElementById('download-btn');
    const versionBadge = document.querySelector('.ver-badge.stable');
    try {
      const res = await fetch('https://api.github.com/repos/HacobAllon/VATPHIL-Sector-Updater/releases/latest');
      if (!res.ok) throw new Error('API error');
      const release = await res.json();
      // Prefer .exe, then .zip, then first asset, else release page
      const asset =
        release.assets.find(a => a.name.endsWith('.exe')) ||
        release.assets.find(a => a.name.endsWith('.zip')) ||
        release.assets[0];
      if (asset) {
        btn.href = asset.browser_download_url;
        btn.removeAttribute('target');
        btn.setAttribute('download', asset.name);
      } else {
        btn.href = release.html_url;
      }
      if (versionBadge && release.tag_name) {
        versionBadge.textContent = release.tag_name + ' Stable';
      }
    } catch (e) {
      // Falls back to the releases page link already on the button
    }
  })();
</script>
</body>
</html>
